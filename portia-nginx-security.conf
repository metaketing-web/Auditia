# Skydeen Audit — Nginx (HTTP → HTTPS + durcissement maximal)
# Domaine : audit.skydeen.ai

limit_req_zone $binary_remote_addr zone=portia_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=portia_api:10m rate=90r/m;
limit_conn_zone $binary_remote_addr zone=portia_conn:10m;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# --- HTTP : challenge ACME + redirection HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name audit.skydeen.ai;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        allow all;
    }

    location / {
        return 301 https://audit.skydeen.ai$request_uri;
    }
}

# IP directe → domaine canonique
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name 13.51.252.61 _;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        allow all;
    }

    location / {
        return 301 https://audit.skydeen.ai$request_uri;
    }
}

# --- HTTPS ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name audit.skydeen.ai;

    ssl_certificate     /etc/letsencrypt/live/audit.skydeen.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/audit.skydeen.ai/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:PortiaSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 55m;
    limit_conn portia_conn 40;

    # Fichiers sensibles
    location ~ /\. {
        deny all;
        return 404;
    }
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }
    location = /package.json {
        deny all;
        return 404;
    }
    location = /requirements.txt {
        deny all;
        return 404;
    }
    location ~* ^/(team-users|\.team-passwords) {
        deny all;
        return 404;
    }
    location ~* \.(sql|sqlite|db|bak|pem|key)$ {
        deny all;
        return 404;
    }

    location = /api/auth/login {
        limit_req zone=portia_login burst=2 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        limit_req zone=portia_api burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:3080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }

    location ^~ /data/ {
        deny all;
        return 404;
    }

    # Assets statiques — servis par Nginx (évite 503 HTML pendant redémarrage API)
    location /tutoriels/ {
        root /opt/portia-audit;
        try_files $uri =404;
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
    }

    location ~* \.(js|css|png|jpe?g|gif|webp|ico|svg|woff2?|map)$ {
        root /opt/portia-audit;
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
    }

    # Page de connexion — jamais mise en cache (évite ancien branding Portia)
    location = /index.html {
        root /opt/portia-audit;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }

    location = / {
        root /opt/portia-audit;
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }

    location / {
        proxy_pass http://127.0.0.1:3080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }
}
