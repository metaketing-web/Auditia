<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Dépôt sécurisé — Mission PNIPM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#fdfbf6;--card:#fff;--line:#e8e2d6;--terra:#c45c26;--terra-deep:#8f3d14;--txt:#1a1814;--txt2:#5c564c;--sage:#3d6b4f;--warn:#7a5a14}
    *{box-sizing:border-box}body{margin:0;font-family:'DM Sans',system-ui,sans-serif;background:linear-gradient(180deg,#fdfbf6,#f4eee2);color:var(--txt);min-height:100vh}
    .wrap{max-width:560px;margin:0 auto;padding:24px 16px 48px}
    .brand{display:flex;align-items:center;gap:10px;margin-bottom:24px}
    .brand b{font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--terra-deep)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px 20px;box-shadow:0 8px 32px rgba(26,24,20,.06)}
    h1{font-size:22px;margin:0 0 8px;font-weight:700}
    .sub{font-size:14px;color:var(--txt2);line-height:1.55;margin:0 0 18px}
    .meta{font-size:12.5px;color:var(--txt2);background:#f8f5ef;border-radius:8px;padding:12px 14px;margin-bottom:18px;line-height:1.6}
    .meta b{color:var(--txt)}
    .dz{border:2px dashed var(--line);border-radius:12px;padding:28px 16px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s}
    .dz:hover,.dz.drag{border-color:var(--terra);background:var(--terra-soft,#faf3ed)}
    .dz b{display:block;font-size:15px;margin-bottom:6px}
    .dz span{font-size:12.5px;color:var(--txt2)}
    .field{margin-top:14px}
    .field label{display:block;font-size:12px;font-weight:600;margin-bottom:6px;color:var(--txt2)}
    .field input,.field select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:16px;padding:12px 16px;border:none;border-radius:10px;background:var(--terra);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .note{font-size:12px;color:var(--txt2);margin-top:14px;line-height:1.5}
    .files{margin-top:20px}
    .files h3{font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:var(--txt2);margin:0 0 10px}
    .file-row{display:flex;justify-content:space-between;gap:8px;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px}
    .bdg{font-size:11px;padding:2px 8px;border-radius:99px;background:#eef6f0;color:var(--sage);white-space:nowrap}
    .bdg.wait{background:#fff8e6;color:var(--warn)}
    .err{color:#a32;padding:14px;border-radius:8px;background:#fef2f2;font-size:14px}
    .closed{color:var(--warn);background:#fff8e6;padding:14px;border-radius:8px;font-size:14px;margin-bottom:16px}
    #statusLoad{text-align:center;padding:40px;color:var(--txt2)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#1a1814"/><path d="M8 22V10h4.5l5.5 8.5V10H22v12h-4.2l-5.8-9v9H8z" fill="#e8a87c"/></svg>
      <b>Skydeen Audit · PNIPM</b>
    </div>
    <div id="statusLoad">Chargement…</div>
    <div id="app" style="display:none"></div>
  </div>
  <script src="collecte.js?v=20260605"></script>
</body>
</html>
